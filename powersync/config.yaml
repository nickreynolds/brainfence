# PowerSync Self-Hosted Configuration
# Docs: https://docs.powersync.com/self-hosting/configuration

# Postgres replication source (Supabase)
replication:
  connections:
    - type: postgresql
      # Reads SUPABASE_DB_URL from .env
      # Requires logical replication on Supabase Postgres (wal_level = logical)
      uri: !env PS_DB_URL

# Client JWT validation (explicit JWKS — Supabase auto-detect requires db.<ref> URI)
client_auth:
  jwks_uri: !env PS_JWKS_URL
  audience: ["authenticated"]

storage:
  type: mongodb
  uri: !env PS_MONGO_URI

# Sync rules — defined in INFRA-005
sync_rules:
  path: /config/sync-rules.yaml

# Service port
port: 8080
