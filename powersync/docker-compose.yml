services:
  mongo:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: >
        mongosh --quiet --eval "
        try { rs.status().ok }
        catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}).ok }"
      interval: 5s
      start_period: 10s

  powersync:
    image: journeyapps/powersync-service:latest
    depends_on:
      - mongo
    ports:
      - "8080:8080"
    environment:
      POWERSYNC_CONFIG_PATH: /config/config.yaml
    volumes:
      - .:/config
    env_file:
      - ../.env
    restart: unless-stopped

networks:
  default:
    enable_ipv6: true

volumes:
  mongo_data:
